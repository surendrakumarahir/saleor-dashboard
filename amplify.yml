version: 1

frontend:
  phases:
    preBuild:
      commands:
        - export API_URL=https://easypick.mooo.com/graphql/
        - export APP_MOUNT_URI=/
        - export STATIC_URL=/
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - export API_URL=https://easypick.mooo.com/graphql/
        - export APP_MOUNT_URI=/
        - export STATIC_URL=/
        - pnpm build
        - echo "=== INDEX HTML ==="
        - cat build/dashboard/index.html
  artifacts:
    baseDirectory: build/dashboard
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
